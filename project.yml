name: MeetsVault
options:
  bundleIdPrefix: com.germanpereyra
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.germanpereyra.meetsvault
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ONLY_ACTIVE_ARCH: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"

targets:
  MeetsVault:
    type: application
    platform: macOS
    dependencies:
      - package: WhisperKit
        product: WhisperKit
    sources:
      - path: MeetsVault
        excludes:
          - "**/*.md"
    info:
      path: MeetsVault/Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: "15.0"
        CFBundleName: MeetsVault
        CFBundleDisplayName: MeetsVault
        CFBundleIdentifier: com.germanpereyra.meetsvault
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleURLTypes:
          - CFBundleURLName: com.germanpereyra.meetsvault.url
            CFBundleURLSchemes:
              - meetsvault
        NSMicrophoneUsageDescription: "MeetsVault records your microphone so your voice is included in meeting transcripts."
        NSScreenCaptureUsageDescription: "MeetsVault captures system audio (required to transcribe what other meeting participants say). Your screen is not recorded."
        CFBundleIconFile: AppIcon
        NSPrincipalClass: NSApplication
    entitlements:
      path: MeetsVault/MeetsVault.entitlements
      properties:
        com.apple.security.device.audio-input: true
        com.apple.security.app-sandbox: false
    settings:
      base:
        INFOPLIST_FILE: MeetsVault/Info.plist
        CODE_SIGN_ENTITLEMENTS: MeetsVault/MeetsVault.entitlements
    postBuildScripts:
      - name: Stamp build number with date and re-sign
        script: |
          BUILD_NUM=$(date +%Y%m%d%H%M)
          PLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" "$PLIST"
          IDENTITY="${EXPANDED_CODE_SIGN_IDENTITY:--}"
          ENTITLEMENTS_ARG=""
          if [ -n "${CODE_SIGN_ENTITLEMENTS:-}" ] && [ -f "${SRCROOT}/${CODE_SIGN_ENTITLEMENTS}" ]; then
            ENTITLEMENTS_ARG="--entitlements ${SRCROOT}/${CODE_SIGN_ENTITLEMENTS}"
          fi
          /usr/bin/codesign --force --sign "$IDENTITY" -o runtime $ENTITLEMENTS_ARG "${TARGET_BUILD_DIR}/${WRAPPER_NAME}"
          echo "Stamped CFBundleVersion = $BUILD_NUM and re-signed"
        # Declare the bundle Info.plist as input so Xcode orders this script
        # after ProcessInfoPlistFile, not before it.
        inputFiles:
          - $(TARGET_BUILD_DIR)/$(INFOPLIST_PATH)
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(WRAPPER_NAME)/_BuildStamp
        basedOnDependencyAnalysis: false
        runOnlyWhenInstalling: false

  MeetsVaultTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MeetsVaultTests
    dependencies:
      - target: MeetsVault
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MeetsVault.app/Contents/MacOS/MeetsVault"
        GENERATE_INFOPLIST_FILE: YES
